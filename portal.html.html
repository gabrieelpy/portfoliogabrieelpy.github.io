<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Portal Grimaldi</title>
</head>
<body>
    <div id="head" style="text-align: center;"></div>
    <h1>Seja bem vindo ao Portal Grimaldi!</h1>
    <h2>Qual máteria gostaria de ler hoje?</h2>
    <div id="imagens">
        <a href="jornal1.html"><img src="data/banana.jpg" alt="banana" id="img1"></a>
        <a href="jornal2.html"><img src="data/sol.jpg" alt="sol" id="img2"></a>
    </div>
    <script>
            var today = new Date()
            var hour = today.getHours()
            var minutes = today.getMinutes()
            var day = today.getDay()
            if (minutes <10){
                minutes = "0" + minutes
            }
            var head = window.document.getElementById("head")
            var strday = ""
            if (hour >= 6 && hour <= 12){
                head.innerHTML = "<h1>Bom dia!</h1>"
            }else if (hour < 18){
                head.innerHTML = "<h1>Boa tarde!</h1>"
            }else{
                head.innerHTML = "<h1>Boa noite</h1>"
            }
            switch(day){
                case 0:
                    strday = "Domingo"
                    break
                case 1:
                    strday = "Segunda-feira"
                    break
                case 2:
                    strday = "Terça-feira"
                    break
                case 3: 
                    strday = "Quarta-feira"
                    break
                case 4:
                    strday = "Quinta-feira"
                    break
                case 5:
                    strday = "Sexta-feira"
                    break
                case 6:
                    strday = "Sábado"
                    break
                default: 
                    strday = "Unspected day!"
                    break
            }
            head.innerHTML += `<h2>${strday}, ${today.getDate()}/${today.getMonth()}/${today.getFullYear()} ${hour}:${minutes} </h2> `

    </script>
</body>
</html>
